    <circle cx="6"  cy="6"  r="1.8" fill="rgba(201,168,76,0.5)"/>
    <circle cx="14" cy="4"  r="1.2" fill="rgba(201,168,76,0.3)"/>
    <circle cx="22" cy="8"  r="1.5" fill="rgba(201,168,76,0.4)"/>
    <circle cx="10" cy="14" r="1.0" fill="rgba(201,168,76,0.25)"/>
    <circle cx="20" cy="18" r="1.8" fill="rgba(201,168,76,0.45)"/>
    <circle cx="6"  cy="22" r="1.2" fill="rgba(201,168,76,0.3)"/>
    <line x1="6"  y1="6"  x2="22" y2="8"   stroke="rgba(201,168,76,0.15)" stroke-width="0.6"/>
    <line x1="22" y1="8"  x2="20" y2="18"  stroke="rgba(201,168,76,0.15)" stroke-width="0.6"/>
    <line x1="6"  y1="6"  x2="10" y2="14"  stroke="rgba(201,168,76,0.12)" stroke-width="0.6"/>
    <line x1="10" y1="14" x2="20" y2="18"  stroke="rgba(201,168,76,0.12)" stroke-width="0.6"/>

<!-- ── BACKDROP ── -->
<div id="sc-backdrop"></div>

<!-- ══════════════════════════════════════════════════════
     MODAL SHELL
══════════════════════════════════════════════════════ -->
<div id="sc-modal" role="dialog" aria-label="Private chat">

  <!-- ── SCREEN: AUTH ── -->
  <div id="sc-screen-auth" class="sc-screen sc-screen--active">
    <div class="sc-auth-bg">
      <!-- animated floating orbs -->
      <div class="sc-orb sc-orb--1"></div>
      <div class="sc-orb sc-orb--2"></div>
      <div class="sc-orb sc-orb--3"></div>
    </div>

    <div class="sc-auth-card">
      <!-- Logo -->
      <div class="sc-auth-logo">
        <div class="sc-auth-logo-ring">
          <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
            <circle cx="6"  cy="6"  r="1.8" fill="#c9a84c"/>
            <circle cx="22" cy="8"  r="1.5" fill="#c9a84c" opacity="0.7"/>
            <circle cx="20" cy="20" r="1.8" fill="#c9a84c"/>
            <circle cx="6"  cy="22" r="1.2" fill="#c9a84c" opacity="0.6"/>
            <line x1="6"  y1="6"  x2="22" y2="8"  stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
            <line x1="22" y1="8"  x2="20" y2="20" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
            <line x1="20" y1="20" x2="6"  y2="22" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
            <line x1="6"  y1="22" x2="6"  y2="6"  stroke="#c9a84c" stroke-width="0.8" opacity="0.3"/>
          </svg>
        </div>
      </div>

      <h2 class="sc-auth-title">Private Channel</h2>
      <p class="sc-auth-sub">A quiet corner of the internet.</p>

      <!-- Pill switcher -->
      <div class="sc-switcher">
        <button class="sc-switcher-btn active" id="sc-sw-new"  onclick="scShowTab('new')">New here</button>
        <button class="sc-switcher-btn"        id="sc-sw-ret"  onclick="scShowTab('return')">Returning</button>
      </div>

      <!-- CREATE ACCOUNT -->
      <div id="sc-tab-new" class="sc-tab-panel sc-tab-panel--active">
        <div class="sc-field">
          <label class="sc-label">Username</label>
          <input id="sc-new-user" class="sc-input" type="text"
            placeholder="e.g. cosmic_fox" autocomplete="off" spellcheck="false" maxlength="30"/>
        </div>
        <div class="sc-field">
          <label class="sc-label">Password</label>
          <input id="sc-new-pass" class="sc-input" type="password"
            placeholder="At least 6 characters" maxlength="50"/>
        </div>
        <div class="sc-field">
          <label class="sc-label">Confirm password</label>
          <input id="sc-new-pass2" class="sc-input" type="password"
            placeholder="Same again" maxlength="50"/>
        </div>
        <button class="sc-btn-primary" onclick="scCreateUser()">
          <span id="sc-create-label">Create account &amp; enter</span>
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- SIGN IN -->
      <div id="sc-tab-return" class="sc-tab-panel">
        <div class="sc-field">
          <label class="sc-label">Username</label>
          <input id="sc-input-user" class="sc-input" type="text"
            placeholder="Your username" autocomplete="off" spellcheck="false"/>
        </div>
        <div class="sc-field">
          <label class="sc-label">Password</label>
          <input id="sc-input-pass" class="sc-input" type="password"
            placeholder="Your password"/>
        </div>
        <button class="sc-btn-primary" onclick="scLogin()">
          <span id="sc-login-label">Continue my conversation</span>
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <p id="sc-auth-err" class="sc-err"></p>
    </div>
  </div>

  <!-- ── SCREEN: USER CHAT ── -->
  <div id="sc-screen-chat" class="sc-screen">
    <div class="sc-topbar">
      <div class="sc-topbar-left">
        <div class="sc-avatar" id="sc-avatar-char">?</div>
        <div class="sc-topbar-info">
          <div class="sc-topbar-name" id="sc-display-name">—</div>
          <div class="sc-topbar-status">
            <span class="sc-dot-live"></span>private channel
          </div>
        </div>
      </div>
      <button class="sc-icon-btn" onclick="scClose()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="sc-messages" id="sc-messages">
      <div class="sc-welcome">
        <div class="sc-welcome-glyph">✦</div>
        <p>You found the hidden channel.<br>Say hello.</p>
      </div>
    </div>

    <div class="sc-composer">
      <label class="sc-icon-btn sc-attach" title="Attach file">
        <input type="file" id="sc-file-input" style="display:none"
          onchange="scHandleFile(this)"
          accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip"/>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </label>
      <textarea id="sc-text-input" class="sc-textarea"
        placeholder="Type a message…" rows="1"
        onkeydown="scKeyDown(event)" oninput="scAutoResize(this)"></textarea>
      <button class="sc-send-btn" onclick="scSend()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
            stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── SCREEN: ADMIN ── -->
  <div id="sc-screen-admin" class="sc-screen">

    <div class="sc-topbar sc-topbar--admin">
      <div class="sc-topbar-left">
        <div class="sc-avatar sc-avatar--admin">⚡</div>
        <div class="sc-topbar-info">
          <div class="sc-topbar-name">Master View</div>
          <div class="sc-topbar-status">
            <span class="sc-dot-live" style="background:#e07070;"></span>
            <span id="sc-admin-status">no conversation selected</span>
          </div>
        </div>
      </div>
      <button class="sc-icon-btn" onclick="scClose()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="sc-admin-body">

      <!-- Sidebar: list of users -->
      <div class="sc-admin-sidebar">
        <div class="sc-admin-sidebar-hd">
          <span>Conversations</span>
          <button class="sc-admin-refresh" onclick="scAdminRefreshList()" title="Refresh">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div id="sc-admin-user-list" class="sc-admin-user-list">
          <div class="sc-admin-loading">Loading…</div>
        </div>
      </div>

      <!-- Main: messages + composer -->
      <div class="sc-admin-main">
        <div class="sc-messages" id="sc-admin-messages">
          <div class="sc-welcome">
            <div class="sc-welcome-glyph" style="color:rgba(224,112,112,0.4);">⚡</div>
            <p>Select a conversation<br>from the left to open it.</p>
          </div>
        </div>

        <div class="sc-composer" id="sc-admin-composer" style="display:none;">
          <label class="sc-icon-btn sc-attach" title="Attach file">
            <input type="file" id="sc-admin-file-input" style="display:none"
              onchange="scAdminFile(this)"
              accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip"/>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </label>
          <textarea id="sc-admin-textarea" class="sc-textarea sc-textarea--admin"
            placeholder="Reply as Void…" rows="1"
            onkeydown="scAdminKey(event)" oninput="scAutoResize(this)"></textarea>
          <button class="sc-send-btn sc-send-btn--admin" onclick="scAdminSend()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- ── SUPABASE ── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
'use strict';

/* ════════════════════════════════════════════════
   CONFIG — change MASTER_USERNAME / MASTER_PASSWORD
════════════════════════════════════════════════ */
const SUPA_URL        = 'https://pzwhdnyzepxhvjenjofs.supabase.co';
const SUPA_KEY        = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6d2hkbnl6ZXB4aHZqZW5qb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTUyOTQsImV4cCI6MjA5MjI3MTI5NH0.M0w-56bFYsE5asu_lZfawQjiH4_U4ye1fsFALjWi9QE';
const MASTER_USERNAME = 'Arsalan';
const MASTER_PASSWORD = 'Bohemiano@1';

const db = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ── STATE ── */
let currentUser    = null;
let isMaster       = false;
let realtimeSub    = null;
let adminRoomSub   = null;
let activeRoom     = null;   /* {username, room_id} currently open in admin */

/* ── HASH ── */
async function hashPass(p){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ════════════════════════════════════════════════
   EGG + OPEN / CLOSE
════════════════════════════════════════════════ */
document.getElementById('sc-egg').addEventListener('click', scOpen);

function scOpen(){
  document.getElementById('sc-backdrop').classList.add('active');
  document.getElementById('sc-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

window.scClose = function(){
  document.getElementById('sc-backdrop').classList.remove('active');
  document.getElementById('sc-modal').classList.remove('active');
  document.body.style.overflow = '';
};

document.getElementById('sc-backdrop').addEventListener('click', scClose);

/* ════════════════════════════════════════════════
   SCREEN SWITCHER
════════════════════════════════════════════════ */
function scShow(screenId){
  document.querySelectorAll('.sc-screen').forEach(s=>{
    s.classList.toggle('sc-screen--active', s.id === screenId);
  });
}

/* ════════════════════════════════════════════════
   AUTH TABS
════════════════════════════════════════════════ */
window.scShowTab = function(tab){
  const isNew = tab === 'new';
  document.getElementById('sc-sw-new').classList.toggle('active', isNew);
  document.getElementById('sc-sw-ret').classList.toggle('active', !isNew);
  document.getElementById('sc-tab-new').classList.toggle('sc-tab-panel--active', isNew);
  document.getElementById('sc-tab-return').classList.toggle('sc-tab-panel--active', !isNew);
  document.getElementById('sc-auth-err').textContent = '';
};

/* ════════════════════════════════════════════════
   CREATE ACCOUNT
════════════════════════════════════════════════ */
window.scCreateUser = async function(){
  const username = document.getElementById('sc-new-user').value.trim();
  const pass1    = document.getElementById('sc-new-pass').value;
  const pass2    = document.getElementById('sc-new-pass2').value;
  const btn      = document.getElementById('sc-create-label');
  const err      = document.getElementById('sc-auth-err');
  err.textContent = '';

  if(!username)                             { err.textContent='Choose a username.'; return; }
  if(username.length < 3)                   { err.textContent='Username must be at least 3 characters.'; return; }
  if(/[^a-zA-Z0-9_\-]/.test(username))     { err.textContent='Letters, numbers, _ and - only.'; return; }
  if(username.toLowerCase()===MASTER_USERNAME.toLowerCase()){ err.textContent='That name is reserved.'; return; }
  if(!pass1 || pass1.length < 6)           { err.textContent='Password must be at least 6 characters.'; return; }
  if(pass1 !== pass2)                      { err.textContent='Passwords do not match.'; return; }

  btn.textContent = 'Checking…';
  const {data:ex} = await db.from('users').select('username').eq('username',username).maybeSingle();
  if(ex){ err.textContent='Username taken — try another.'; btn.textContent='Create account & enter'; return; }

  btn.textContent = 'Setting up your room…';
  const hash    = await hashPass(pass1);
  const room_id = 'room_'+username;
  const {error} = await db.from('users').insert({username, password_hash:hash, room_id});
  if(error){ err.textContent='Error: '+error.message; btn.textContent='Create account & enter'; return; }

  currentUser = {username, room_id};
  isMaster    = false;
  scEnterUserChat();
};

/* ════════════════════════════════════════════════
   SIGN IN
════════════════════════════════════════════════ */
window.scLogin = async function(){
  const username = document.getElementById('sc-input-user').value.trim();
  const password = document.getElementById('sc-input-pass').value;
  const btn      = document.getElementById('sc-login-label');
  const err      = document.getElementById('sc-auth-err');
  if(!username||!password){ err.textContent='Fill in both fields.'; return; }

  /* ── Master shortcut ── */
  if(username === MASTER_USERNAME && password === MASTER_PASSWORD){
    currentUser = {username: MASTER_USERNAME, room_id: '__master__'};
    isMaster    = true;
    scEnterAdmin();
    return;
  }

  btn.textContent = 'Finding your room…';
  const hash = await hashPass(password);
  const {data,error} = await db.from('users').select('*')
    .eq('username',username).eq('password_hash',hash).maybeSingle();

  if(error||!data){
    err.textContent = 'Username or password incorrect.';
    btn.textContent = 'Continue my conversation';
    return;
  }
  currentUser = {username:data.username, room_id:data.room_id};
  isMaster    = false;
  scEnterUserChat();
};

/* ════════════════════════════════════════════════
   USER CHAT
════════════════════════════════════════════════ */
function scEnterUserChat(){
  document.getElementById('sc-display-name').textContent = currentUser.username;
  document.getElementById('sc-avatar-char').textContent  = currentUser.username[0].toUpperCase();
  scShow('sc-screen-chat');
  scUserLoad();
  scUserSubscribe();
}

async function scUserLoad(){
  const {data} = await db.from('messages').select('*')
    .eq('room_id', currentUser.room_id).order('created_at',{ascending:true});
  const box = document.getElementById('sc-messages');
  if(data && data.length){
    box.innerHTML = '';
    data.forEach(m => scRenderMsg(m, box, currentUser.username));
  }
  scScrollBot(box);
}

function scUserSubscribe(){
  if(realtimeSub) realtimeSub.unsubscribe();
  realtimeSub = db.channel('user:'+currentUser.room_id)
    .on('postgres_changes',{
      event:'INSERT', schema:'public', table:'messages',
      filter:'room_id=eq.'+currentUser.room_id
    }, p=>{
      const box = document.getElementById('sc-messages');
      scRenderMsg(p.new, box, currentUser.username);
      scScrollBot(box);
    }).subscribe();
}

window.scSend = async function(){
  const ta = document.getElementById('sc-text-input');
  const v  = ta.value.trim();
  if(!v) return;
  ta.value=''; scAutoResize(ta);
  await db.from('messages').insert({room_id:currentUser.room_id, username:currentUser.username, content:v});
};

window.scKeyDown = e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();scSend();} };

window.scHandleFile = async function(inp){
  const f = inp.files[0]; if(!f) return;
  const path = currentUser.room_id+'/'+Date.now()+'.'+f.name.split('.').pop();
  const {error} = await db.storage.from('chat-files').upload(path,f,{upsert:true});
  if(error){alert('Upload failed: '+error.message);return;}
  const {data:{publicUrl}} = db.storage.from('chat-files').getPublicUrl(path);
  await db.from('messages').insert({room_id:currentUser.room_id,username:currentUser.username,content:null,file_url:publicUrl,file_type:f.type});
  inp.value='';
};

/* ════════════════════════════════════════════════
   ADMIN
════════════════════════════════════════════════ */
function scEnterAdmin(){
  scShow('sc-screen-admin');
  scAdminRefreshList();
}

window.scAdminRefreshList = async function(){
  const list = document.getElementById('sc-admin-user-list');
  list.innerHTML = '<div class="sc-admin-loading">Loading…</div>';
  const {data} = await db.from('users').select('username,room_id').order('created_at',{ascending:false});
  list.innerHTML = '';
  if(!data||!data.length){
    list.innerHTML='<div class="sc-admin-empty">No conversations yet.</div>';
    return;
  }
  data.forEach(u=>{
    const btn = document.createElement('button');
    btn.className = 'sc-admin-user-btn';
    btn.dataset.roomId = u.room_id;
    btn.innerHTML =
      '<div class="sc-admin-av">'+u.username[0].toUpperCase()+'</div>'+
      '<div class="sc-admin-user-info">'+
        '<span class="sc-admin-user-name">'+scEsc(u.username)+'</span>'+
        '<span class="sc-admin-user-room">'+scEsc(u.room_id)+'</span>'+
      '</div>';
    btn.addEventListener('click',()=> scAdminOpen(u, btn));
    list.appendChild(btn);
  });
};

async function scAdminOpen(u, btn){
  document.querySelectorAll('.sc-admin-user-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeRoom = u;
  document.getElementById('sc-admin-status').textContent = 'chatting with @'+u.username;
  document.getElementById('sc-admin-composer').style.display = 'flex';

  const box = document.getElementById('sc-admin-messages');
  box.innerHTML = '<div class="sc-admin-loading-msg">Loading messages…</div>';

  const {data} = await db.from('messages').select('*')
    .eq('room_id', u.room_id).order('created_at',{ascending:true});
  box.innerHTML = '';
  if(data && data.length){
    data.forEach(m=> scRenderMsg(m, box, MASTER_USERNAME));
  } else {
    box.innerHTML='<div class="sc-welcome"><div class="sc-welcome-glyph" style="color:rgba(224,112,112,0.4);">✦</div><p>No messages yet in this room.</p></div>';
  }
  scScrollBot(box);

  if(adminRoomSub) adminRoomSub.unsubscribe();
  adminRoomSub = db.channel('admin:'+u.room_id)
    .on('postgres_changes',{
      event:'INSERT', schema:'public', table:'messages',
      filter:'room_id=eq.'+u.room_id
    }, p=>{
      scRenderMsg(p.new, box, MASTER_USERNAME);
      scScrollBot(box);
    }).subscribe();
}

window.scAdminSend = async function(){
  if(!activeRoom){ alert('Select a conversation first.'); return; }
  const ta = document.getElementById('sc-admin-textarea');
  const v  = ta.value.trim(); if(!v) return;
  ta.value=''; scAutoResize(ta);
  await db.from('messages').insert({room_id:activeRoom.room_id, username:MASTER_USERNAME, content:v});
};

window.scAdminKey = e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();scAdminSend();} };

window.scAdminFile = async function(inp){
  const f = inp.files[0]; if(!f||!activeRoom) return;
  const path = activeRoom.room_id+'/admin-'+Date.now()+'.'+f.name.split('.').pop();
  const {error} = await db.storage.from('chat-files').upload(path,f,{upsert:true});
  if(error){alert('Upload failed: '+error.message);return;}
  const {data:{publicUrl}} = db.storage.from('chat-files').getPublicUrl(path);
  await db.from('messages').insert({room_id:activeRoom.room_id,username:MASTER_USERNAME,content:null,file_url:publicUrl,file_type:f.type});
  inp.value='';
};

/* ════════════════════════════════════════════════
   SHARED RENDER
════════════════════════════════════════════════ */
function scRenderMsg(msg, box, selfName){
  const isOwn    = msg.username === selfName;
  const isMaster = msg.username === MASTER_USERNAME;
  const wrap = document.createElement('div');
  wrap.className = 'sc-msg '+(isOwn?'sc-msg--own':'sc-msg--other');

  const time = new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let body = '';

  if(msg.file_url){
    if(msg.file_type && msg.file_type.startsWith('image/')){
      body = '<img src="'+msg.file_url+'" class="sc-msg-img" onclick="window.open(\''+msg.file_url+'\')" />';
    } else {
      const name = decodeURIComponent(msg.file_url.split('/').pop().split('?')[0]);
      body = '<a href="'+msg.file_url+'" target="_blank" class="sc-msg-file">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.5"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.5"/></svg>'+
        name+'</a>';
    }
  } else {
    body = '<span>'+scEsc(msg.content)+'</span>';
  }

  const badge = (!isOwn && isMaster)
    ? '<div class="sc-msg-badge">⚡ '+scEsc(msg.username)+'</div>'
    : (!isOwn ? '<div class="sc-msg-sender-name">'+scEsc(msg.username)+'</div>' : '');

  const bubbleExtra = (!isOwn && isMaster) ? ' sc-bubble--master' : '';

  wrap.innerHTML = badge +
    '<div class="sc-bubble'+bubbleExtra+'">'+body+'</div>'+
    '<div class="sc-msg-time">'+time+'</div>';

  box.appendChild(wrap);
}

/* ════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════ */
window.scAutoResize = function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
};

function scScrollBot(el){ if(el) el.scrollTop = el.scrollHeight; }

function scEsc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

})();
</script>
