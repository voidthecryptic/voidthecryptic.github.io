<!-- _includes/secret-chat.html -->

<!-- EGG -->
<div id="sc-egg" title="">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="6"  cy="6"  r="1.8" fill="rgba(201,168,76,0.5)"/>
    <circle cx="14" cy="4"  r="1.2" fill="rgba(201,168,76,0.3)"/>
    <circle cx="22" cy="8"  r="1.5" fill="rgba(201,168,76,0.4)"/>
    <circle cx="10" cy="14" r="1.0" fill="rgba(201,168,76,0.25)"/>
    <circle cx="20" cy="18" r="1.8" fill="rgba(201,168,76,0.45)"/>
    <circle cx="6"  cy="22" r="1.2" fill="rgba(201,168,76,0.3)"/>
    <line x1="6" y1="6" x2="22" y2="8"   stroke="rgba(201,168,76,0.15)" stroke-width="0.6"/>
    <line x1="22" y1="8" x2="20" y2="18"  stroke="rgba(201,168,76,0.15)" stroke-width="0.6"/>
    <line x1="6" y1="6" x2="10" y2="14"  stroke="rgba(201,168,76,0.12)" stroke-width="0.6"/>
    <line x1="10" y1="14" x2="20" y2="18" stroke="rgba(201,168,76,0.12)" stroke-width="0.6"/>
    <line x1="20" y1="18" x2="6" y2="22"  stroke="rgba(201,168,76,0.1)"  stroke-width="0.6"/>
  </svg>
</div>

<!-- BACKDROP -->
<div id="sc-backdrop"></div>

<!-- MODAL -->
<div id="sc-modal" role="dialog" aria-label="Private chat">

  <!-- AUTH -->
  <div id="sc-auth">
    <div class="sc-auth-inner">
      <div class="sc-logo">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
          <circle cx="6"  cy="6"  r="1.8" fill="#c9a84c"/>
          <circle cx="22" cy="8"  r="1.5" fill="#c9a84c" opacity="0.7"/>
          <circle cx="20" cy="20" r="1.8" fill="#c9a84c"/>
          <circle cx="6"  cy="22" r="1.2" fill="#c9a84c" opacity="0.6"/>
          <line x1="6"  y1="6"  x2="22" y2="8"  stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
          <line x1="22" y1="8"  x2="20" y2="20" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
          <line x1="20" y1="20" x2="6"  y2="22" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
        </svg>
      </div>
      <h2 class="sc-auth-title">Private Channel</h2>
      <p class="sc-auth-sub">A quiet space to talk.</p>

      <div class="sc-tabs">
        <button class="sc-tab-btn active" onclick="scShowTab('new')">New here</button>
        <button class="sc-tab-btn" onclick="scShowTab('return')">Returning</button>
      </div>

      <!-- NEW USER: choose your own username + password -->
      <div id="sc-tab-new" class="sc-tab-panel active">
        <p class="sc-hint">Create your account to join.</p>
        <input id="sc-new-user" class="sc-input" type="text" placeholder="Choose a username" autocomplete="off" spellcheck="false" maxlength="30"/>
        <input id="sc-new-pass" class="sc-input" type="password" placeholder="Choose a password" maxlength="50"/>
        <input id="sc-new-pass2" class="sc-input" type="password" placeholder="Confirm password" maxlength="50"/>
        <button class="sc-btn-primary" onclick="scCreateUser()">
          <span id="sc-create-label">Create account &amp; enter</span>
        </button>
      </div>

      <!-- RETURNING USER -->
      <div id="sc-tab-return" class="sc-tab-panel">
        <input id="sc-input-user" class="sc-input" type="text" placeholder="Your username" autocomplete="off" spellcheck="false"/>
        <input id="sc-input-pass" class="sc-input" type="password" placeholder="Your password"/>
        <button class="sc-btn-primary" onclick="scLogin()">
          <span id="sc-login-label">Continue my conversation</span>
        </button>
      </div>

      <p id="sc-auth-err" class="sc-err"></p>
    </div>
  </div>

  <!-- CHAT -->
  <div id="sc-chat" style="display:none;">
    <div class="sc-chat-header">
      <div class="sc-chat-header-left">
        <div class="sc-avatar" id="sc-avatar-char">?</div>
        <div>
          <div class="sc-chat-name" id="sc-display-name">—</div>
          <div class="sc-chat-status">
            <span class="sc-status-dot"></span><span id="sc-chat-status-label">private channel</span>
          </div>
        </div>
      </div>
      <!-- Master: room selector (hidden for normal users) -->
      <select id="sc-room-selector" class="sc-room-select" onchange="scMasterSwitchRoom(this.value)" style="display:none;"></select>
      <button class="sc-close-btn" onclick="scClose()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="sc-messages" id="sc-messages">
      <div class="sc-welcome">
        <div class="sc-welcome-icon">✦</div>
        <p>You found the hidden channel. Say hello.</p>
      </div>
    </div>

    <div class="sc-input-bar">
      <label class="sc-attach-btn" title="Share a file">
        <input type="file" id="sc-file-input" style="display:none"
          onchange="scHandleFile(this)"
          accept="image/*,video/*,.pdf,.doc,.docx,.txt"/>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </label>

      <textarea
        id="sc-text-input"
        class="sc-textarea"
        placeholder="Type a message…"
        rows="1"
        onkeydown="scKeyDown(event)"
        oninput="scAutoResize(this)"
      ></textarea>

      <button class="sc-send-btn" onclick="scSend()" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(function(){
'use strict';

const SUPA_URL  = 'https://pzwhdnyzepxhvjenjofs.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6d2hkbnl6ZXB4aHZqZW5qb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTUyOTQsImV4cCI6MjA5MjI3MTI5NH0.M0w-56bFYsE5asu_lZfawQjiH4_U4ye1fsFALjWi9QE';
const db        = supabase.createClient(SUPA_URL, SUPA_KEY);

/* ── MASTER ACCOUNT ─────────────────────────────────────────
   Set these to your chosen master credentials.
   The master user can see ALL rooms and reply to anyone.
────────────────────────────────────────────────────────────── */
const MASTER_USERNAME = 'Arsalan';
const MASTER_PASSWORD = 'Bohemiano@1';

let currentUser  = null;
let isMaster     = false;
let realtimeSub  = null;
let masterRooms  = [];   // list of {room_id, username} for master view

async function hashPass(pass){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* EGG */
document.getElementById('sc-egg').addEventListener('click', scOpen);

/* OPEN/CLOSE */
function scOpen(){
  document.getElementById('sc-backdrop').classList.add('active');
  document.getElementById('sc-modal').classList.add('active');
  document.body.style.overflow='hidden';
}

window.scClose = function(){
  document.getElementById('sc-backdrop').classList.remove('active');
  document.getElementById('sc-modal').classList.remove('active');
  document.body.style.overflow='';
};

document.getElementById('sc-backdrop').addEventListener('click', scClose);

/* TABS */
window.scShowTab = function(tab){
  document.querySelectorAll('.sc-tab-btn').forEach((b,i)=>
    b.classList.toggle('active',(i===0&&tab==='new')||(i===1&&tab==='return')));
  document.getElementById('sc-tab-new').classList.toggle('active',tab==='new');
  document.getElementById('sc-tab-return').classList.toggle('active',tab==='return');
  document.getElementById('sc-auth-err').textContent='';
};

/* ── CREATE USER ─────────────────────────────────────────── */
window.scCreateUser = async function(){
  const username = document.getElementById('sc-new-user').value.trim();
  const pass1    = document.getElementById('sc-new-pass').value;
  const pass2    = document.getElementById('sc-new-pass2').value;
  const btn      = document.getElementById('sc-create-label');
  const err      = document.getElementById('sc-auth-err');

  err.textContent = '';

  if(!username){ err.textContent='Please choose a username.'; return; }
  if(username.length < 3){ err.textContent='Username must be at least 3 characters.'; return; }
  if(/[^a-zA-Z0-9_\-]/.test(username)){ err.textContent='Username: letters, numbers, _ and - only.'; return; }
  if(!pass1){ err.textContent='Please choose a password.'; return; }
  if(pass1.length < 6){ err.textContent='Password must be at least 6 characters.'; return; }
  if(pass1 !== pass2){ err.textContent='Passwords do not match.'; return; }

  btn.textContent = 'Checking availability…';

  /* block master username */
  if(username.toLowerCase() === MASTER_USERNAME.toLowerCase()){
    err.textContent = 'That username is reserved.';
    btn.textContent = 'Create account & enter';
    return;
  }

  const {data:exists} = await db.from('users').select('username').eq('username',username).maybeSingle();
  if(exists){
    err.textContent = 'Username taken — try another.';
    btn.textContent = 'Create account & enter';
    return;
  }

  btn.textContent = 'Creating your room…';
  const hash    = await hashPass(pass1);
  const room_id = 'room_'+username;

  const {error} = await db.from('users').insert({username, password_hash:hash, room_id});
  if(error){
    err.textContent = 'Error: '+error.message;
    btn.textContent = 'Create account & enter';
    return;
  }

  currentUser = {username, password:pass1, room_id};
  isMaster    = false;
  scEnterChat();
};

/* ── LOGIN ───────────────────────────────────────────────── */
window.scLogin = async function(){
  const username = document.getElementById('sc-input-user').value.trim();
  const password = document.getElementById('sc-input-pass').value;
  const label    = document.getElementById('sc-login-label');
  const err      = document.getElementById('sc-auth-err');

  if(!username||!password){ err.textContent='Please fill in both fields.'; return; }

  label.textContent = 'Finding your room…';
  const hash = await hashPass(password);

  /* ── Master login ── */
  if(username === MASTER_USERNAME && password === MASTER_PASSWORD){
    currentUser = {username:MASTER_USERNAME, password, room_id:'__master__'};
    isMaster    = true;
    await scEnterMasterChat();
    return;
  }

  const {data,error} = await db
    .from('users').select('*')
    .eq('username',username)
    .eq('password_hash',hash)
    .maybeSingle();

  if(error||!data){
    err.textContent = 'Username or password incorrect.';
    label.textContent = 'Continue my conversation';
    return;
  }

  currentUser = {username:data.username, password, room_id:data.room_id};
  isMaster    = false;
  scEnterChat();
};

/* ── NORMAL ENTER CHAT ───────────────────────────────────── */
function scEnterChat(){
  document.getElementById('sc-auth').style.display='none';
  document.getElementById('sc-chat').style.display='flex';
  document.getElementById('sc-display-name').textContent = currentUser.username;
  document.getElementById('sc-avatar-char').textContent  = currentUser.username[0].toUpperCase();
  document.getElementById('sc-chat-status-label').textContent = 'private channel';
  document.getElementById('sc-room-selector').style.display = 'none';

  scLoadMessages();
  scSubscribe();
}

/* ── MASTER ENTER CHAT ───────────────────────────────────── */
async function scEnterMasterChat(){
  document.getElementById('sc-auth').style.display='none';
  document.getElementById('sc-chat').style.display='flex';
  document.getElementById('sc-display-name').textContent = '⚡ '+MASTER_USERNAME;
  document.getElementById('sc-avatar-char').textContent  = '⚡';
  document.getElementById('sc-chat-status-label').textContent = 'master view';

  /* Load all user rooms */
  const {data:users} = await db.from('users').select('username,room_id').order('username',{ascending:true});
  masterRooms = users || [];

  const sel = document.getElementById('sc-room-selector');
  sel.innerHTML = '<option value="">— select a user —</option>';
  masterRooms.forEach(u=>{
    const opt = document.createElement('option');
    opt.value = u.room_id;
    opt.textContent = u.username;
    sel.appendChild(opt);
  });
  sel.style.display = 'block';

  /* Start with empty/welcome until a room is picked */
  document.getElementById('sc-messages').innerHTML =
    '<div class="sc-welcome"><div class="sc-welcome-icon">⚡</div><p>Master view — select a user above to read &amp; reply.</p></div>';
}

/* ── MASTER SWITCH ROOM ──────────────────────────────────── */
window.scMasterSwitchRoom = function(room_id){
  if(!room_id) return;
  currentUser.room_id = room_id;
  const user = masterRooms.find(u=>u.room_id===room_id);
  document.getElementById('sc-chat-status-label').textContent =
    user ? 'chatting with '+user.username : 'master view';
  scLoadMessages();
  scSubscribe();
};

/* ── LOAD HISTORY ────────────────────────────────────────── */
async function scLoadMessages(){
  const {data} = await db
    .from('messages').select('*')
    .eq('room_id',currentUser.room_id)
    .order('created_at',{ascending:true});
  if(data && data.length>0){
    document.getElementById('sc-messages').innerHTML='';
    data.forEach(scRenderMessage);
  } else {
    document.getElementById('sc-messages').innerHTML=
      '<div class="sc-welcome"><div class="sc-welcome-icon">✦</div><p>You found the hidden channel. Say hello.</p></div>';
  }
  scScrollBottom();
}

/* ── REALTIME ────────────────────────────────────────────── */
function scSubscribe(){
  if(realtimeSub) realtimeSub.unsubscribe();
  realtimeSub = db.channel('room:'+currentUser.room_id)
    .on('postgres_changes',{
      event:'INSERT',schema:'public',table:'messages',
      filter:'room_id=eq.'+currentUser.room_id
    }, payload=>{
      scRenderMessage(payload.new);
      scScrollBottom();
    })
    .subscribe();
}

/* ── RENDER MESSAGE ──────────────────────────────────────── */
function scRenderMessage(msg){
  const wrap  = document.createElement('div');
  /* Master messages appear as "own" when master is logged in; users see master replies as "other" */
  const isOwn = msg.username === currentUser.username ||
                (isMaster && msg.username === MASTER_USERNAME);
  wrap.className='sc-msg '+(isOwn?'sc-msg--own':'sc-msg--other');

  /* Master reply gets a gold badge */
  const isMasterMsg = msg.username === MASTER_USERNAME;

  const time = new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let body='';

  if(msg.file_url){
    if(msg.file_type && msg.file_type.startsWith('image/')){
      body='<img src="'+msg.file_url+'" class="sc-msg-img" onclick="window.open(\''+msg.file_url+'\')"/>';
    } else {
      const name=decodeURIComponent(msg.file_url.split('/').pop().split('?')[0]);
      body='<a href="'+msg.file_url+'" target="_blank" class="sc-msg-file">'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.5"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.5"/></svg>'+
        name+'</a>';
    }
  } else {
    body='<span>'+scEscape(msg.content)+'</span>';
  }

  const senderLabel = isMasterMsg
    ? '<div class="sc-msg-sender sc-msg-master-label">⚡ '+scEscape(msg.username)+'</div>'
    : (!isOwn ? '<div class="sc-msg-sender">'+scEscape(msg.username)+'</div>' : '');

  wrap.innerHTML=
    senderLabel+
    '<div class="sc-bubble'+(isMasterMsg?' sc-bubble--master':'')+'">'+body+'</div>'+
    '<div class="sc-msg-time">'+time+'</div>';

  document.getElementById('sc-messages').appendChild(wrap);
}

/* ── SEND ────────────────────────────────────────────────── */
window.scSend = async function(){
  const input = document.getElementById('sc-text-input');
  const text  = input.value.trim();
  if(!text||!currentUser) return;
  /* Master must have a room selected */
  if(isMaster && currentUser.room_id==='__master__'){
    document.getElementById('sc-messages').innerHTML +=
      '<div class="sc-welcome"><div class="sc-welcome-icon">⚠️</div><p>Select a user first.</p></div>';
    return;
  }
  input.value='';
  scAutoResize(input);
  await db.from('messages').insert({
    room_id:currentUser.room_id,
    username:currentUser.username,
    content:text
  });
};

window.scKeyDown = function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();scSend();}
};

window.scAutoResize = function(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
};

/* ── FILE UPLOAD ─────────────────────────────────────────── */
window.scHandleFile = async function(input){
  const file=input.files[0];
  if(!file||!currentUser) return;
  if(isMaster && currentUser.room_id==='__master__'){ alert('Select a user room first.'); return; }
  const ext=file.name.split('.').pop();
  const path=currentUser.room_id+'/'+Date.now()+'.'+ext;
  const {error} = await db.storage.from('chat-files').upload(path,file,{upsert:true});
  if(error){alert('Upload failed: '+error.message);return;}
  const {data:{publicUrl}} = db.storage.from('chat-files').getPublicUrl(path);
  await db.from('messages').insert({
    room_id:currentUser.room_id,
    username:currentUser.username,
    content:null,
    file_url:publicUrl,
    file_type:file.type
  });
  input.value='';
};

function scScrollBottom(){
  const el=document.getElementById('sc-messages');
  el.scrollTop=el.scrollHeight;
}

function scEscape(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

})();
</script>
